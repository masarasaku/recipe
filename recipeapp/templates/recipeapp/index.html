{% extends 'recipeapp/base.html' %}

{% block content %}
    <div class="container py-5" style="max-width: 600px;">
        <div class="card shadow-sm p-4 bg-white rounded">
            <h2 class="text-center text-success mb-3 fs-4 fw-bold">入力した食材からレシピを提案</h2>
            <p class="text-muted text-center small">冷蔵庫にある食材を入力すると、AIが即座にレシピを提案します。</p>
            
            <form id="recipe-form" method="POST" class="mt-4">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="ingredients" class="form-label">食材</label>
                    <input type="text" id="ingredients" name="ingredients" class="form-control" placeholder="レタス、豚肉、人参" required>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block text-start fw-bold text-secondary">🛒 家にある調味料</label>
                    <div class="p-3 border rounded bg-white text-start">
                        
                        <div class="mb-2">
                            <span class="badge bg-secondary me-2">基本</span>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="砂糖" {% if "砂糖" in saved_seasonings %}checked{% endif %}> 砂糖</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="塩" {% if "塩" in saved_seasonings %}checked{% endif %}> 塩</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="酢" {% if "酢" in saved_seasonings %}checked{% endif %}> 酢</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="醤油" {% if "醤油" in saved_seasonings %}checked{% endif %}> 醤油</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="味噌" {% if "味噌" in saved_seasonings %}checked{% endif %}> 味噌</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="みりん" {% if "みりん" in saved_seasonings %}checked{% endif %}> みりん</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="酒" {% if "酒" in saved_seasonings %}checked{% endif %}> 酒</label>
                        </div>

                        <hr class="my-2 text-muted">

                        <div class="mb-2">
                            <span class="badge bg-secondary me-2">油類</span>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="サラダ油" {% if "サラダ油" in saved_seasonings %}checked{% endif %}> サラダ油</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="ごま油" {% if "ごま油" in saved_seasonings %}checked{% endif %}> ごま油</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="オリーブオイル" {% if "オリーブオイル" in saved_seasonings %}checked{% endif %}> オリーブオイル</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="バター" {% if "バター" in saved_seasonings %}checked{% endif %}> バター</label>
                        </div>

                        <hr class="my-2 text-muted">

                        <div class="mb-2">
                            <span class="badge bg-secondary me-2">ソース類</span>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="マヨネーズ" {% if "マヨネーズ" in saved_seasonings %}checked{% endif %}> マヨネーズ</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="ケチャップ" {% if "ケチャップ" in saved_seasonings %}checked{% endif %}> ケチャップ</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="ウスターソース" {% if "ウスターソース" in saved_seasonings %}checked{% endif %}> ウスターソース</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="ポン酢" {% if "ポン酢" in saved_seasonings %}checked{% endif %}> ポン酢</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="めんつゆ" {% if "めんつゆ" in saved_seasonings %}checked{% endif %}> めんつゆ</label>
                        </div>

                        <hr class="my-2 text-muted">

                        <div>
                            <span class="badge bg-secondary me-2">薬味・香辛料</span>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="にんにく" {% if "にんにく" in saved_seasonings %}checked{% endif %}> にんにく</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="しょうが" {% if "しょうが" in saved_seasonings %}checked{% endif %}> しょうが</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="コショウ" {% if "コショウ" in saved_seasonings %}checked{% endif %}> コショウ</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="鶏ガラスープの素" {% if "鶏ガラスープの素" in saved_seasonings %}checked{% endif %}> 鶏ガラ素</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="コンソメ" {% if "コンソメ" in saved_seasonings %}checked{% endif %}> コンソメ</label>
                            <label class="me-2"><input type="checkbox" name="seasonings" value="ほんだし" {% if "ほんだし" in saved_seasonings %}checked{% endif %}> ほんだし</label>
                        </div>

                    </div>
                    <div class="mt-3 text-start">
                        <label class="form-label small fw-bold text-secondary">・追加する↓ その他(パスタソース、○○の素、市販のタレなど)</label>
                        <input type="text" id="other_seasonings" name="other_seasonings" class="form-control-sm" 
                        placeholder="例:麻婆豆腐の素、焼肉のタレ"
                        value="{{ other_seasonings_value }}">
                    </div>    
                </div>

                <button type="submit" id="submit-btn" class="btn btn-success btn-lg w-100 mt-2" disabled>
                    ✨ 献立を考えてもらう
                </button>
            </form>
        </div>
    </div>

    <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255,255,255,0.95); z-index: 99999; justify-content: center; align-items: center; flex-direction: column;">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="mt-3 fs-5 text-dark fw-bold">⏳ AIが最高の献立を考案中...</p>
        <p class="text-muted small">10秒ほどかかります。画面を閉じずにお待ちください。</p>
    </div>

    <script>
    const recipeForm = document.getElementById('recipe-form');
    const ingredientsInput = document.getElementById('ingredients');
    const submitBtn = document.getElementById('submit-btn');
    const loadingOverlay = document.getElementById('loading-overlay');

    // 1. 食材の入力状態を監視してボタンの有効・無効を切り替える
    ingredientsInput.addEventListener('input', function() {
        const trimmedValue = this.value.trim();
        if (trimmedValue.length > 0) {
            submitBtn.disabled = false;
        } else {
            submitBtn.disabled = true;
        }
    });

    // 2. フォーム送信時の処理（ローディング表示）
    recipeForm.addEventListener('submit', function(e) {
        if (!submitBtn.disabled) {
            loadingOverlay.style.display = 'flex';
        }
    });
    </script>      
{% endblock %}
